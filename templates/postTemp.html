<b>{{post["name"]}}</b>
{%if dId==post["user"]%}<input onclick="edit({{post["id"]}})" value="Edit"/>{%else%}
<input type="button" onclick="vote(1,{{post["id"]})" value="Vote Up" /> <input type="button" onclick="vote(-1,{{post["id"]})" value="Vote Down" />
{%endif%}
<br>
{{positive}}<br>
Verified on: {{verified}}
Phone: <a href="tel:{{post["phone"]}}" rel="nofollow">{{post["phone"]}}</a>
Posted on: {{post["time"]}}
<p>{{post["info"]}}</p>
